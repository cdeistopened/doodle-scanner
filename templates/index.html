<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
<title>SCANDOC 9000</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{
  "paper":"#f8f8ec","navy":"#0a1628","teal":"#2aa198","teal-dim":"#1a8a82",
  "ink":"#1e1e1e","mist":"#e8e4dc","mist-dark":"#d4d0c7",
  "electric":"#567cff","lcd-bg":"#002b36",
  "error":"#ba1a1a","on-error":"#ffffff"
},fontFamily:{
  "display":["Space Grotesk","sans-serif"],
  "body":["Plus Jakarta Sans","sans-serif"],
  "mono":["Space Mono","monospace"]
},borderRadius:{"DEFAULT":"0","lg":"2px","xl":"4px"}}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f8ec;color:#1e1e1e}
h1,h2,h3,.font-display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}
.font-mono{font-family:'Space Mono',monospace}
.lcd-glow{text-shadow:0 0 8px rgba(42,161,152,0.6)}

/* CIA-style buttons: thick border, hard shadow hover */
.btn-primary{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;
  background:#2aa198;color:#f8f8ec;padding:16px 32px;
  border:3px solid #1e1e1e;cursor:pointer;transition:all 0.15s;
  text-transform:uppercase;letter-spacing:0.05em;
}
.btn-primary:hover{transform:translate(-2px,-2px);box-shadow:4px 4px 0 #1e1e1e}
.btn-primary:active{transform:translate(0,0);box-shadow:none}
.btn-primary:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}

.btn-secondary{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;
  background:transparent;color:#1e1e1e;padding:14px 28px;
  border:3px solid #d4d0c7;cursor:pointer;transition:all 0.15s;
  text-transform:uppercase;letter-spacing:0.05em;
}
.btn-secondary:hover{border-color:#1e1e1e;transform:translate(-2px,-2px);box-shadow:4px 4px 0 #d4d0c7}
.btn-secondary:active{transform:translate(0,0);box-shadow:none}
.btn-secondary:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}

.btn-danger{
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;
  background:#ba1a1a;color:#f8f8ec;padding:14px 28px;
  border:3px solid #1e1e1e;cursor:pointer;transition:all 0.15s;
  text-transform:uppercase;letter-spacing:0.05em;
}

/* Upload zone */
.upload-zone{border:3px dashed #bfb9ad;transition:all 0.2s;background:rgba(255,255,255,0.5)}
.upload-zone:hover{border-color:#2aa198;border-width:3px;background:rgba(42,161,152,0.04)}
.upload-zone.dragover{border-color:#2aa198;border-style:solid;border-width:4px;background:rgba(42,161,152,0.08)}

/* Tabs */
.tab{cursor:pointer;transition:all 100ms;border-bottom:3px solid transparent}
.tab.active{background:#0a1628;color:#2aa198;border-bottom-color:#2aa198}
.tab:not(.active){background:#f0efe6;color:#1e1e1e}
.tab:not(.active):hover{background:#e8e4dc}

/* Cards / panels */
.panel{background:#fff;border:2px solid #e8e4dc}
.panel-dark{background:#0a1628;border:2px solid #1e1e1e;color:#f8f8ec}

/* Job history items */
.job-item{background:#fff;border:2px solid #e8e4dc;transition:all 0.15s}
.job-item:hover{border-color:#2aa198;transform:translate(-1px,-1px);box-shadow:3px 3px 0 #e8e4dc}

/* Flash */
#flash{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;transition:opacity .15s}
#flash.fire{opacity:.6;transition:none}

/* Section labels */
.section-label{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#567cff}
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-8 h-16 bg-navy">
  <span class="font-display uppercase tracking-wider text-lg font-bold text-teal lcd-glow cursor-pointer" onclick="goHome()">SCANDOC 9000</span>
  <span id="headerStatus" class="font-mono text-xs text-teal lcd-glow tracking-wider">READY</span>
</header>

<!-- TAB BAR -->
<div class="fixed top-16 w-full z-40 flex border-b-2 border-ink/10">
  <button id="tabUpload" class="tab active flex-1 py-4 font-display text-sm font-semibold uppercase tracking-wider text-center" onclick="switchTab('upload')">
    <span class="material-symbols-outlined text-base mr-1.5 align-[-3px]">upload_file</span>Upload PDF
  </button>
  <button id="tabScan" class="tab flex-1 py-4 font-display text-sm font-semibold uppercase tracking-wider text-center" onclick="switchTab('scan')">
    <span class="material-symbols-outlined text-base mr-1.5 align-[-3px]">photo_camera</span>Scan Pages
  </button>
</div>

<!-- MAIN -->
<main class="pt-32 pb-8 px-6 md:px-12 flex-1">
  <div class="max-w-4xl mx-auto">

    <!-- ============ UPLOAD TAB ============ -->
    <div id="panelUpload" class="tab-panel">

      <!-- State: idle (upload zone) -->
      <div id="uploadIdle">
        <div id="uploadZone" class="upload-zone p-16 md:p-20 text-center cursor-pointer"
             onclick="document.getElementById('pdfInput').click()">
          <span class="material-symbols-outlined text-7xl text-mist-dark mb-6 block">upload_file</span>
          <div class="font-display text-2xl font-bold uppercase tracking-wide mb-2">Drop a PDF here</div>
          <div class="font-body text-base text-ink/50">or click to choose a file</div>
        </div>
        <input type="file" id="pdfInput" accept=".pdf" class="hidden"/>
      </div>

      <!-- State: processing (scanner simulation) -->
      <div id="uploadProcessing" style="display:none">
        <!-- Page preview with scanner line -->
        <div class="relative bg-stone-100 border-2 border-outline-variant overflow-hidden" style="aspect-ratio:8.5/11;max-height:55vh;">
          <!-- Page image (rendered from PDF) -->
          <canvas id="pageCanvas" class="w-full h-full object-contain"></canvas>
          <!-- Scanner light bar -->
          <div id="scannerBar" class="absolute left-0 right-0 h-1.5 bg-primary-container z-10" style="top:0%;box-shadow:0 0 12px #2aa198,0 0 4px #fff;transition:top 0.3s linear;"></div>
          <!-- Processed overlay (green tint above the bar) -->
          <div id="scannerOverlay" class="absolute left-0 right-0 top-0 bg-primary-container/5 z-5" style="height:0%;transition:height 0.3s linear;"></div>
        </div>
        <!-- LCD status below -->
        <div class="panel-dark p-5">
          <div class="flex justify-between items-center mb-3">
            <div id="jobFilename" class="font-display text-base text-teal lcd-glow uppercase truncate font-bold"></div>
            <div id="jobPct" class="font-mono text-base text-teal lcd-glow font-bold">0%</div>
          </div>
          <div class="h-2.5 bg-white/10 overflow-hidden mb-2">
            <div id="jobProgressBar" class="h-full bg-teal transition-all duration-500" style="width:0%"></div>
          </div>
          <div id="jobDetail" class="font-mono text-xs text-teal/50"></div>
          <div id="jobMeta" class="font-mono text-[10px] text-teal/30 mt-1"></div>
        </div>
      </div>

      <!-- State: complete -->
      <div id="uploadComplete" style="display:none">
        <div class="panel p-8 md:p-10 text-center">
          <span class="material-symbols-outlined text-6xl text-teal mb-4 block">check_circle</span>
          <div id="resultTitle" class="font-display text-xl font-bold uppercase tracking-tight mb-2"></div>
          <div id="resultMeta" class="font-mono text-sm text-ink/50 mb-8"></div>
          <div id="resultLinks" class="flex gap-4 justify-center mb-8"></div>
          <button onclick="resetUpload()" class="btn-secondary">Upload another PDF</button>
        </div>
      </div>
    </div>

    <!-- ============ SCAN TAB ============ -->
    <div id="panelScan" class="tab-panel" style="display:none">
      <!-- Camera viewfinder -->
      <div class="relative bg-black overflow-hidden mb-4" style="aspect-ratio:4/3;max-height:50vh;">
        <video id="video" autoplay playsinline muted class="w-full h-full object-cover block"></video>
        <canvas id="motionCanvas" class="hidden"></canvas>
        <div id="flash"></div>
        <!-- Preset bounding box overlay -->
        <div id="presetOverlay" class="absolute inset-0 pointer-events-none" style="display:none">
          <div id="presetBox" class="absolute border-2 border-dashed border-teal/50"></div>
          <div id="presetLabel" class="absolute top-2 left-1/2 -translate-x-1/2 font-mono text-[10px] text-teal bg-black/60 px-2 py-0.5 uppercase tracking-wider"></div>
        </div>
        <!-- Motion status bar -->
        <div class="absolute bottom-0 left-0 right-0 bg-navy/90 py-2.5 px-4 text-center">
          <span id="motionText" class="font-display text-sm text-teal lcd-glow uppercase tracking-wider">Turn to next page</span>
        </div>
        <!-- Page count -->
        <div class="absolute top-3 right-3 bg-navy/80 px-3 py-1.5 font-mono text-sm text-teal">
          <span id="pageCount">0</span> pages
        </div>
      </div>

      <!-- Bounding box presets -->
      <div class="flex gap-2 flex-wrap mb-4">
        <button onclick="setPreset('none')" class="preset-btn btn-primary !py-1.5 !px-3 !text-xs !border-2" data-preset="none">None</button>
        <button onclick="setPreset('openbook')" class="preset-btn btn-secondary !py-1.5 !px-3 !text-xs !border-2" data-preset="openbook">Open Book</button>
        <button onclick="setPreset('paperback')" class="preset-btn btn-secondary !py-1.5 !px-3 !text-xs !border-2" data-preset="paperback">Paperback</button>
        <button onclick="setPreset('letter')" class="preset-btn btn-secondary !py-1.5 !px-3 !text-xs !border-2" data-preset="letter">Letter</button>
      </div>

      <!-- Camera controls -->
      <div class="flex gap-3 mb-3">
        <button onclick="capture()" class="flex-[2] btn-primary flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-xl">photo_camera</span> Capture
        </button>
        <button id="btnNext" onclick="nextDoc()" disabled class="flex-1 btn-secondary disabled:opacity-30">
          Next Doc
        </button>
      </div>
      <div class="flex gap-2 items-center mb-4">
        <button onclick="rotateImage()" class="btn-secondary !py-2 !px-3 !text-xs !border-2">↻ <span id="rotLabel">0°</span></button>
        <button onclick="toggleMotion()" class="btn-secondary !py-2 !px-3 !text-xs !border-2">Motion <span id="motionLabel">ON</span></button>
        <button onclick="toggleSettings()" class="btn-secondary !py-2 !px-3 !text-xs !border-2"><span class="material-symbols-outlined text-sm align-[-2px]">settings</span> Settings</button>
        <button id="btnFinish" onclick="finishScanning()" disabled class="ml-auto btn-danger !py-2 !px-4 !text-xs disabled:opacity-30">
          Done (<span id="finishCount">0</span> pages)
        </button>
      </div>
    </div>

    <!-- ============ RECENT JOBS (both tabs) ============ -->
    <div class="mt-6">
      <h2 class="section-label mb-3">Recent Jobs</h2>
      <div id="jobList" class="flex flex-col gap-2">
        <div class="font-mono text-xs text-outline italic">No jobs yet</div>
      </div>
    </div>

  </div>
</main>

<!-- PDF MODAL -->
<div id="pdfModal" class="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" style="display:none">
  <div class="bg-paper border-3 border-ink p-6 max-w-sm w-[90%] shadow-[6px_6px_0_rgba(30,30,30,0.15)]">
    <h3 id="pdfModalTitle" class="font-headline text-sm font-bold uppercase tracking-tighter mb-2 break-all"></h3>
    <div class="bg-lcd-bg p-3 font-mono text-[10px] text-primary-container mb-4 leading-relaxed">
      <div id="pdfScanInfo"></div>
    </div>
    <button onclick="runOcr()" class="w-full btn-primary flex flex-col items-center gap-1">
      <span>RUN OCR</span>
      <span id="ocrCost" class="text-[10px] font-normal opacity-70"></span>
    </button>
    <button onclick="closePdfModal()" class="w-full font-mono text-xs text-ink/40 uppercase py-3 mt-1 hover:text-ink transition-colors">Cancel</button>
  </div>
</div>

<!-- FINISH SCANNING MODAL -->
<div id="finishModal" class="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" style="display:none">
  <div class="bg-paper border-3 border-ink p-6 max-w-sm w-[90%] shadow-[6px_6px_0_rgba(30,30,30,0.15)]">
    <h3 class="font-headline text-lg font-bold uppercase tracking-tighter mb-2">Session Complete</h3>
    <p id="finishSummary" class="font-mono text-xs text-outline mb-4"></p>
    <button onclick="classifySession()" class="w-full btn-primary mb-3">Classify & File</button>
    <button onclick="closeFinishModal()" class="w-full font-mono text-xs text-ink/40 uppercase py-3 hover:text-ink transition-colors">Cancel</button>
  </div>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settingsOverlay" class="fixed inset-0 z-[90] bg-black/60 flex items-center justify-center" style="display:none">
  <div class="bg-paper border-3 border-ink p-6 max-w-sm w-[90%] shadow-[6px_6px_0_rgba(30,30,30,0.15)] max-h-[80vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-headline text-lg font-bold uppercase tracking-tighter">Settings</h2>
      <button onclick="toggleSettings()" class="text-outline hover:text-on-surface"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Save Location</label>
      <div class="flex gap-2">
        <input id="outputPath" type="text" class="flex-1 bg-surface-container-high border border-outline-variant font-mono text-sm px-3 py-2"/>
        <button onclick="saveOutputPath()" class="bg-primary text-on-primary font-headline font-bold px-3 py-2 text-xs uppercase keycap-sm">Set</button>
      </div>
      <div id="outputStatus" class="font-mono text-[10px] text-outline mt-1"></div>
    </div>
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Motion Sensitivity</label>
      <input id="sensitivitySlider" type="range" min="1" max="10" value="5" class="w-full accent-primary"/>
      <div class="flex justify-between font-mono text-[9px] text-outline"><span>Thick pages</span><span>Thin pages</span></div>
    </div>
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Capture Delay</label>
      <input id="delaySlider" type="range" min="0.3" max="3" step="0.1" value="1.0" class="w-full accent-primary"/>
      <div class="flex justify-between font-mono text-[9px] text-outline"><span>Faster</span><span>More settling</span></div>
    </div>
    <div class="bg-lcd-bg p-3 font-mono text-[10px] text-primary-container">
      Resolution: 1500px · JPEG 85%<br/>Model: Gemini 3.1 Flash-Lite
    </div>
  </div>
</div>

<script>
// ==================== STATE ====================
let stream=null,rotation=0,totalPages=0,currentDocPages=0;
let motionEnabled=true,motionPrev=null,motionState='idle';
let motionStableStart=null,motionCooldownStart=null;
let pendingPdfFile=null,activeJobId=null;
const M_THRESH=8,S_THRESH=3,S_DELAY=1.0,COOLDOWN=2.0;
const LIBRARY_KEY='scandoc9000_library';

// ==================== TABS ====================
function switchTab(tab){
  document.getElementById('tabUpload').classList.toggle('active',tab==='upload');
  document.getElementById('tabScan').classList.toggle('active',tab==='scan');
  document.getElementById('panelUpload').style.display=tab==='upload'?'block':'none';
  document.getElementById('panelScan').style.display=tab==='scan'?'block':'none';
  if(tab==='scan'&&!stream) startCamera();
  if(tab==='scan'&&motionEnabled) setTimeout(()=>requestAnimationFrame(motionLoop),1000);
}
function goHome(){
  switchTab('upload');
  resetUpload();
}

// ==================== PRESETS (bounding box) ====================
const PRESETS={none:{ratio:null,label:''},openbook:{ratio:12/9,label:'Open Book 12×9'},paperback:{ratio:6/9,label:'Paperback 6×9'},letter:{ratio:8.5/11,label:'Letter 8.5×11'}};
let currentPreset='none';
function setPreset(name){
  currentPreset=name;
  document.querySelectorAll('.preset-btn').forEach(b=>{
    if(b.dataset.preset===name){b.className=b.className.replace('btn-secondary','btn-primary');}
    else{b.className=b.className.replace('btn-primary','btn-secondary');}
  });
  const overlay=document.getElementById('presetOverlay');
  const p=PRESETS[name];
  if(!p||!p.ratio){overlay.style.display='none';return;}
  overlay.style.display='block';
  document.getElementById('presetLabel').textContent=p.label;
  const pad=0.08,maxW=1-2*pad,maxH=1-2*pad;
  let w,h;
  if(p.ratio>1){w=maxW;h=maxW/p.ratio;}else{h=maxH;w=maxH*p.ratio;}
  if(w>maxW){w=maxW;h=w/p.ratio;}
  if(h>maxH){h=maxH;w=h*p.ratio;}
  const box=document.getElementById('presetBox');
  box.style.left=((1-w)/2*100)+'%';box.style.top=((1-h)/2*100)+'%';
  box.style.width=(w*100)+'%';box.style.height=(h*100)+'%';
}

// ==================== UPLOAD STATES ====================
function showUploadState(state){
  document.getElementById('uploadIdle').style.display=state==='idle'?'block':'none';
  document.getElementById('uploadProcessing').style.display=state==='processing'?'block':'none';
  document.getElementById('uploadComplete').style.display=state==='complete'?'block':'none';
}
function resetUpload(){
  showUploadState('idle');
  document.getElementById('headerStatus').textContent='READY';
}

// ==================== CAMERA ====================
async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}});
    document.getElementById('video').srcObject=stream;
  }catch(e){console.error('Camera:',e);}
}
function rotateImage(){
  rotation=(rotation+90)%360;
  document.getElementById('rotLabel').textContent=rotation+'\u00B0';
  const v=document.getElementById('video');
  v.style.transform='rotate('+rotation+'deg)';
  v.style.objectFit=(rotation===90||rotation===270)?'contain':'cover';
}

// ==================== MOTION ====================
function toggleMotion(){
  motionEnabled=!motionEnabled;
  document.getElementById('motionLabel').textContent=motionEnabled?'ON':'OFF';
  motionPrev=null;motionState='idle';
  if(motionEnabled) requestAnimationFrame(motionLoop);
}
function motionLoop(){
  if(!motionEnabled) return;
  const video=document.getElementById('video');
  if(!video.videoWidth){requestAnimationFrame(motionLoop);return;}
  const c=document.getElementById('motionCanvas');
  const w=160,h=120;c.width=w;c.height=h;
  const ctx=c.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(video,0,0,w,h);
  const d=ctx.getImageData(0,0,w,h).data;
  const gray=new Float32Array(w*h);
  for(let i=0;i<w*h;i++) gray[i]=d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114;
  const txt=document.getElementById('motionText');
  if(motionPrev){
    let diff=0;
    for(let i=0;i<gray.length;i++) diff+=Math.abs(gray[i]-motionPrev[i]);
    const delta=diff/gray.length;
    const now=performance.now()/1000;
    if(motionState==='idle'){txt.textContent='Turn to next page';if(delta>M_THRESH) motionState='turning';}
    else if(motionState==='turning'){txt.textContent='Page turning...';if(delta<S_THRESH){motionState='stabilizing';motionStableStart=now;}}
    else if(motionState==='stabilizing'){const el=now-motionStableStart;txt.textContent='Hold still... '+Math.max(0,S_DELAY-el).toFixed(1)+'s';if(delta>S_THRESH) motionState='turning';else if(el>=S_DELAY){capture();motionState='cooldown';motionCooldownStart=now;txt.textContent='Captured!';}}
    else if(motionState==='cooldown'){txt.textContent='Got it! Turn page.';if((now-motionCooldownStart)>=COOLDOWN) motionState='idle';}
  }
  motionPrev=gray;
  requestAnimationFrame(motionLoop);
}

// ==================== CAPTURE ====================
async function capture(){
  const video=document.getElementById('video');
  const canvas=document.createElement('canvas');
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const flash=document.getElementById('flash');
  flash.classList.add('fire');setTimeout(()=>flash.classList.remove('fire'),150);
  const res=await fetch('/api/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:canvas.toDataURL('image/jpeg',0.92),rotation})});
  const data=await res.json();
  if(data.ok!==false){
    totalPages++;currentDocPages=data.total_pages;
    document.getElementById('pageCount').textContent=totalPages;
    document.getElementById('btnNext').disabled=false;
    document.getElementById('btnFinish').disabled=false;
    document.getElementById('finishCount').textContent=totalPages;
  }
}
async function nextDoc(){
  await fetch('/api/next-doc',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  currentDocPages=0;document.getElementById('btnNext').disabled=true;
}
async function finishScanning(){
  const res=await fetch('/api/finish-scanning',{method:'POST'});
  const data=await res.json();
  if(data.ok){
    document.getElementById('finishSummary').textContent=data.doc_count+' docs \u00B7 '+data.page_count+' pages \u00B7 ~$'+data.estimated_cost.toFixed(3);
    document.getElementById('finishModal').style.display='flex';
  }
}
async function classifySession(){
  document.getElementById('finishModal').style.display='none';
  switchTab('upload');
  showUploadState('processing');
  document.getElementById('jobFilename').textContent='Classifying documents...';
  document.getElementById('headerStatus').textContent='CLASSIFYING...';
  await fetch('/api/classify-session',{method:'POST'});
  pollClassify();
}
function closeFinishModal(){document.getElementById('finishModal').style.display='none';}

// ==================== PDF UPLOAD ====================
const uploadZone=document.getElementById('uploadZone');
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files[0])handlePdf(e.dataTransfer.files[0]);});
document.getElementById('pdfInput').addEventListener('change',e=>{if(e.target.files[0])handlePdf(e.target.files[0]);e.target.value='';});

async function handlePdf(file){
  if(!file||!file.name.toLowerCase().endsWith('.pdf')) return;
  const orig=uploadZone.innerHTML;
  uploadZone.innerHTML='<span class="material-symbols-outlined text-6xl text-primary animate-pulse block mb-4">hourglass_top</span><div class="font-headline text-xl uppercase">Uploading...</div>';
  const fd=new FormData();fd.append('file',file);
  const res=await fetch('/api/upload-pdf',{method:'POST',body:fd});
  const data=await res.json();
  uploadZone.innerHTML=orig;
  if(!data.ok) return;
  pendingPdfFile=data;
  document.getElementById('pdfModalTitle').textContent=data.filename;
  const qs=data.quick_scan||{};
  const pages=qs.page_count||data.page_count;
  let info=pages+' pages';
  if(qs.density) info+=' \u00B7 '+qs.density;
  if(qs.avg_words_per_page) info+=' \u00B7 ~'+qs.avg_words_per_page+' words/page';
  if(qs.est_total_words) info+='\n~'+qs.est_total_words.toLocaleString()+' total words';
  if(qs.detected_header) info+='\nHeader: "'+qs.detected_header+'"';
  if(!qs.has_text_layer) info+='\nImage-only (scanned)';
  document.getElementById('pdfScanInfo').textContent=info;
  const isBook=pages>20;
  const cost=isBook?data.book_cost:data.classify_cost;
  const timeStr=qs.est_time_display||(isBook?'~'+Math.round(pages*4/60)+'min':'~'+(pages*3)+'s');
  document.getElementById('ocrCost').textContent='~$'+cost.toFixed(3)+' / '+timeStr;
  document.getElementById('pdfModal').style.display='flex';
}

async function runOcr(){
  const pf=pendingPdfFile;closePdfModal();if(!pf) return;
  const pages=(pf.quick_scan||{}).page_count||pf.page_count;
  const isBook=pages>20;
  showUploadState('processing');
  document.getElementById('jobFilename').textContent=pf.filename;
  document.getElementById('jobMeta').textContent=pages+' pages';
  document.getElementById('jobProgressBar').style.width='0%';
  document.getElementById('jobDetail').textContent='Starting...';
  document.getElementById('headerStatus').textContent='PROCESSING...';
  activeJobId=pf.job_id;
  if(isBook){
    await fetch('/api/start-book-ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:pf.job_id})});
    startScannerSim(pf.job_id,pages);
    pollBookJob(pf.job_id);
  }else{
    await fetch('/api/start-classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:pf.job_id})});
    pollClassify();
  }
}
function closePdfModal(){document.getElementById('pdfModal').style.display='none';pendingPdfFile=null;}

// ==================== POLLING ====================
// ==================== SCANNER SIMULATION ====================
let scannerPageNum=0,scannerTotalPages=0,scannerJobId=null;
let scannerAnimFrame=null,scannerBarPos=0;

function startScannerSim(jobId,totalPages){
  scannerJobId=jobId;scannerTotalPages=totalPages;scannerPageNum=0;
  loadPagePreview(jobId,0);
  animateScanner();
}

function loadPagePreview(jobId,pageNum){
  const canvas=document.getElementById('pageCanvas');
  const ctx=canvas.getContext('2d');
  const img=new Image();
  img.onload=function(){
    canvas.width=img.width;canvas.height=img.height;
    ctx.drawImage(img,0,0);
  };
  img.src='/api/page-preview/'+jobId+'/'+pageNum;
}

function animateScanner(){
  const bar=document.getElementById('scannerBar');
  const overlay=document.getElementById('scannerOverlay');
  scannerBarPos=0;
  function tick(){
    scannerBarPos+=0.4; // speed: ~2.5s per page sweep
    if(scannerBarPos>100) scannerBarPos=0;
    bar.style.top=scannerBarPos+'%';
    overlay.style.height=scannerBarPos+'%';
    scannerAnimFrame=requestAnimationFrame(tick);
  }
  tick();
}

function advanceScannerPage(pageNum){
  if(scannerJobId&&pageNum<scannerTotalPages){
    scannerPageNum=pageNum;
    loadPagePreview(scannerJobId,pageNum);
    scannerBarPos=0; // reset sweep for new page
  }
}

function stopScannerSim(){
  if(scannerAnimFrame) cancelAnimationFrame(scannerAnimFrame);
  scannerAnimFrame=null;
}

async function pollBookJob(jobId){
  let lastChunk='',lastPct=0;
  async function poll(){
    try{
      const job=await(await fetch('/api/book-status/'+jobId)).json();
      if(job.status==='processing'){
        const pct=job.progress||0;const chunk=job.current_chunk||'Analyzing...';
        document.getElementById('jobProgressBar').style.width=pct+'%';
        document.getElementById('jobPct').textContent=pct+'%';
        if(chunk!==lastChunk){document.getElementById('jobDetail').textContent=chunk;lastChunk=chunk;}
        document.getElementById('headerStatus').textContent='OCR '+pct+'%';
        // Advance page preview based on progress
        if(pct>lastPct&&scannerTotalPages>0){
          const newPage=Math.floor((pct/100)*scannerTotalPages);
          if(newPage!==scannerPageNum) advanceScannerPage(newPage);
          lastPct=pct;
        }
        setTimeout(poll,2000);
      }else if(job.status==='complete'){
        stopScannerSim();
        showComplete(jobId,document.getElementById('jobFilename').textContent,job.total_time);
      }else if(job.status==='error'){
        stopScannerSim();
        document.getElementById('jobDetail').textContent='Error: '+(job.error||'Unknown');
        document.getElementById('headerStatus').textContent='ERROR';
      }else{setTimeout(poll,1000);}
    }catch(e){console.error(e);}
  }
  poll();
}

async function pollClassify(){
  async function poll(){
    try{
      const state=await(await fetch('/api/state')).json();
      const active=(state.documents||[]).filter(d=>['queued','processing'].includes(d.status));
      const done=(state.documents||[]).filter(d=>['classified','filed'].includes(d.status));
      if(active.length>0){
        document.getElementById('jobDetail').textContent=active[0].status+'...';
        setTimeout(poll,1000);
      }else if(done.length>0){
        const d=done[done.length-1];
        showComplete(null,(d.title||d.id)+' ['+d.category+']',d.processing_time);
        syncToLocal(state.documents);
      }else{resetUpload();}
    }catch(e){setTimeout(poll,2000);}
  }
  poll();
}

// ==================== COMPLETE ====================
function showComplete(jobId,title,time){
  showUploadState('complete');
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMeta').textContent=(time?time.toFixed(1)+'s':'')+(jobId?' \u00B7 Book OCR':'');
  document.getElementById('headerStatus').textContent='COMPLETE';
  let links='';
  if(jobId){
    links+='<a href="/api/book-download/'+jobId+'" class="btn-primary !py-3 !px-8 !text-sm inline-block no-underline">.MD</a>';
    links+='<a href="/api/book-download-docx/'+jobId+'" class="btn-secondary !py-3 !px-8 !text-sm inline-block no-underline">.DOCX</a>';
  }
  document.getElementById('resultLinks').innerHTML=links;
  addToHistory(title,'done',links);
}

// ==================== JOB HISTORY ====================
function getLocal(){try{return JSON.parse(localStorage.getItem(LIBRARY_KEY)||'[]');}catch(e){return[];}}
function saveLocal(doc){const lib=getLocal();lib.push(doc);localStorage.setItem(LIBRARY_KEY,JSON.stringify(lib));}
function syncToLocal(docs){(docs||[]).filter(d=>['classified','filed'].includes(d.status)).forEach(d=>{
  saveLocal({doc_id:d.id,category:d.category||'misc',title:d.title||d.id,date:new Date().toISOString().slice(0,10),page_count:d.pages||0,cost:d.cost||0,scanned_at:new Date().toISOString()});
});}
function addToHistory(title,status,links){
  const list=document.getElementById('jobList');
  if(list.querySelector('.italic')) list.innerHTML='';
  const item=document.createElement('div');
  item.className='job-item p-3 flex justify-between items-center';
  item.innerHTML='<div class="flex-1 min-w-0"><span class="font-mono text-xs font-bold uppercase truncate block">'+title+'</span></div><span class="font-mono text-[10px] text-primary-container uppercase ml-2">'+status+'</span>';
  list.prepend(item);
}
function loadHistory(){
  const local=getLocal();if(!local.length) return;
  const list=document.getElementById('jobList');list.innerHTML='';
  local.slice().reverse().slice(0,10).forEach(s=>{addToHistory((s.title||'?')+' ['+(s.category||'')+']','done','');});
}

// ==================== SETTINGS ====================
function toggleSettings(){
  const el=document.getElementById('settingsOverlay');
  el.style.display=el.style.display==='flex'?'none':'flex';
  if(el.style.display==='flex') loadOutputPath();
}
async function loadOutputPath(){try{const d=await(await fetch('/api/health')).json();if(d.output_dir) document.getElementById('outputPath').value=d.output_dir;}catch(e){}}
async function saveOutputPath(){
  const path=document.getElementById('outputPath').value.trim();if(!path) return;
  const d=await(await fetch('/api/set-output',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})})).json();
  document.getElementById('outputStatus').textContent=d.ok?'Saved: '+d.path:'Error: '+(d.error||'');
  document.getElementById('outputStatus').style.color=d.ok?'#2aa198':'#ba1a1a';
}
document.getElementById('sensitivitySlider').addEventListener('input',function(){
  const v=this.value;
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'motion_threshold',value:11-v})});
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'stability_threshold',value:2.2-(v*0.2)})});
});
document.getElementById('delaySlider').addEventListener('input',function(){
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'stability_delay',value:parseFloat(this.value)})});
});

// ==================== API KEY CHECK ====================
async function checkHealth(){try{const d=await(await fetch('/api/health')).json();
  if(!d.has_api_key){const b=document.createElement('div');b.className='fixed top-12 left-0 right-0 z-40 bg-error text-on-error px-4 py-3 font-mono text-xs text-center';
  b.innerHTML='GEMINI_API_KEY not set. <code class="bg-black/20 px-1">export GEMINI_API_KEY=your_key</code> <a href="https://aistudio.google.com/apikey" target="_blank" class="underline">Get key</a>';
  document.body.appendChild(b);}}catch(e){}}

// ==================== INIT ====================
checkHealth();
loadHistory();
</script>
