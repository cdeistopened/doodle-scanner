<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"/>
<title>SCANDOC 9000</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-container-low":"#faf3e0","surface-container":"#f4eedb","surface-container-high":"#eee8d5",
        "surface-container-highest":"#e8e2cf","surface-container-lowest":"#ffffff",
        "surface":"#fff9e9","surface-dim":"#e0dac7","surface-bright":"#fff9e9","surface-variant":"#e8e2cf",
        "on-surface":"#1e1c10","on-surface-variant":"#3d4947","on-background":"#1e1c10",
        "primary":"#006a64","primary-container":"#2aa198","primary-fixed":"#89f5ea","primary-fixed-dim":"#6cd8ce",
        "on-primary":"#ffffff","on-primary-container":"#00302d","on-primary-fixed":"#00201e",
        "secondary":"#3c6471","secondary-container":"#bde6f6",
        "on-secondary":"#ffffff","on-secondary-container":"#416875",
        "tertiary":"#aa3600","tertiary-container":"#f06630",
        "on-tertiary":"#ffffff","on-tertiary-container":"#511500",
        "error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff","on-error-container":"#93000a",
        "outline":"#6d7a78","outline-variant":"#bcc9c7",
        "inverse-surface":"#333124","inverse-on-surface":"#f7f1dd","inverse-primary":"#6cd8ce",
        "lcd-bg":"#002b36"
      },
      fontFamily: {
        "headline":["IBM Plex Mono","monospace"],
        "body":["IBM Plex Sans","sans-serif"],
        "label":["IBM Plex Mono","monospace"]
      },
      borderRadius: {"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
    },
  },
}
</script>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; vertical-align:middle; }
body { font-family:'IBM Plex Sans',sans-serif; }
h1,h2,h3,.font-mono,.mono { font-family:'IBM Plex Mono',monospace; }
.lcd-glow { text-shadow:0 0 8px rgba(42,161,152,0.6); }
.hard-shadow { box-shadow:2px 2px 0 0 rgba(30,28,16,0.2); }
.keycap { box-shadow:0 4px 0 0 rgba(30,28,16,1); transition:all 75ms; }
.keycap:active { transform:translateY(4px); box-shadow:0 0 0 0 rgba(30,28,16,1); }
.keycap-sm { box-shadow:0 2px 0 0 rgba(30,28,16,0.3); transition:all 75ms; }
.keycap-sm:active { transform:translateY(2px); box-shadow:none; }
#flash { position:absolute;inset:0;background:white;opacity:0;pointer-events:none;transition:opacity 0.15s; }
#flash.fire { opacity:0.6;transition:none; }
.upload-zone.dragover { border-color:#2aa198 !important; background:rgba(42,161,152,0.05); }
.state { display:none; }
.state.active { display:block; }
@keyframes sweep { 0%{top:0} 100%{top:100%} }
.scanner-sweep { position:absolute;left:0;right:0;height:4px;background:#2aa198;box-shadow:0 0 12px #2aa198;animation:sweep 2s linear infinite;z-index:10; }
</style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col">

<!-- LCD HEADER -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-12 bg-lcd-bg border-b-4 border-on-surface">
  <span class="font-headline uppercase tracking-widest text-sm font-bold text-primary-container lcd-glow cursor-pointer" onclick="goHome()">SCANDOC 9000</span>
  <div class="flex items-center gap-2">
    <span id="headerStatus" class="font-headline text-xs text-primary-container lcd-glow tracking-wider">READY</span>
    <button onclick="showSettings()" class="p-1 text-outline hover:text-primary-container"><span class="material-symbols-outlined text-lg">settings</span></button>
  </div>
</header>

<!-- MAIN CONTENT — single centered column -->
<main class="pt-14 pb-4 px-4 flex-1 flex flex-col items-center">
  <div class="w-full max-w-lg flex flex-col gap-4">

    <!-- ==================== STATE A: HOME ==================== -->
    <div id="stateHome" class="state active flex flex-col gap-4">

      <!-- Upload zone — THE primary action -->
      <div id="uploadZone" class="upload-zone border-2 border-dashed border-outline-variant p-8 md:p-12 text-center cursor-pointer hover:bg-surface-container-low transition-colors"
           onclick="document.getElementById('pdfInput').click()">
        <span class="material-symbols-outlined text-5xl text-outline mb-3 block">upload_file</span>
        <div class="font-headline text-lg uppercase tracking-wider mb-1">Upload a PDF</div>
        <div class="font-body text-sm text-outline">Drop here or click to choose a file</div>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" class="hidden"/>

      <!-- Camera button — secondary -->
      <button onclick="openCamera()" class="w-full bg-surface-container-high border-2 border-on-surface py-5 font-headline text-sm uppercase tracking-widest keycap-sm flex items-center justify-center gap-3">
        <span class="material-symbols-outlined text-2xl">photo_camera</span>
        Scan with Camera
      </button>

      <!-- Recent jobs -->
      <div id="jobHistorySection">
        <h2 class="font-headline text-xs uppercase tracking-widest text-outline border-b border-outline-variant pb-1 mb-2">Recent Jobs</h2>
        <div id="jobList" class="flex flex-col gap-2">
          <div class="font-mono text-xs text-outline italic">No jobs yet</div>
        </div>
      </div>
    </div>

    <!-- ==================== STATE B: PROCESSING ==================== -->
    <div id="stateProcessing" class="state flex flex-col gap-4">
      <div class="bg-lcd-bg p-5 border-2 border-outline-variant relative overflow-hidden">
        <div id="sweepLine" class="scanner-sweep"></div>
        <div id="jobFilename" class="font-headline text-base text-primary-container lcd-glow uppercase truncate mb-1"></div>
        <div id="jobMeta" class="font-mono text-xs text-primary-container/60 mb-3"></div>
        <div class="h-3 bg-black/30 rounded-full overflow-hidden">
          <div id="jobProgressBar" class="h-full bg-primary-container rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <div id="jobDetail" class="font-mono text-[11px] text-primary-container/50 mt-2"></div>
      </div>
    </div>

    <!-- ==================== STATE C: COMPLETE ==================== -->
    <div id="stateComplete" class="state flex flex-col gap-4">
      <div class="bg-surface-container-lowest p-6 border border-outline-variant hard-shadow text-center">
        <span class="material-symbols-outlined text-4xl text-primary-container mb-2 block">check_circle</span>
        <div id="resultTitle" class="font-headline text-base uppercase tracking-tight mb-1"></div>
        <div id="resultMeta" class="font-mono text-xs text-outline mb-4"></div>

        <!-- Big download buttons -->
        <div id="resultLinks" class="flex gap-3 justify-center mb-4"></div>

        <!-- Preview toggle -->
        <button onclick="togglePreview()" class="font-mono text-xs text-primary uppercase hover:underline mb-2">Preview</button>
        <div id="previewArea" class="hidden text-left bg-surface-container p-4 border border-outline-variant max-h-60 overflow-y-auto font-body text-sm leading-relaxed"></div>
      </div>

      <!-- Scan another -->
      <div class="flex gap-3">
        <button onclick="goHome()" class="flex-1 bg-primary text-on-primary font-headline font-bold py-3 text-sm uppercase tracking-widest keycap">
          Upload Another
        </button>
        <button onclick="openCamera()" class="flex-1 bg-surface-container-high border-2 border-on-surface font-headline font-bold py-3 text-xs uppercase tracking-widest keycap-sm">
          Scan Camera
        </button>
      </div>
    </div>

    <!-- ==================== CAMERA VIEW ==================== -->
    <div id="stateCamera" class="state flex flex-col gap-3">
      <div class="flex justify-between items-center">
        <button onclick="goHome()" class="font-mono text-xs text-primary uppercase">← Back</button>
        <span class="font-mono text-xs text-outline">Doc <span id="docNum">1</span> · <span id="docPages">0</span> pages</span>
      </div>

      <!-- Viewfinder -->
      <div class="relative bg-black rounded overflow-hidden" style="aspect-ratio:4/3;">
        <video id="video" autoplay playsinline muted class="w-full h-full object-cover block"></video>
        <canvas id="motionCanvas" class="hidden"></canvas>
        <div id="flash"></div>
        <!-- Motion status — big, centered -->
        <div id="motionStatus" class="absolute bottom-0 left-0 right-0 bg-black/70 py-2 px-3 text-center">
          <span id="motionText" class="font-headline text-sm text-primary-container lcd-glow uppercase tracking-wider">Turn to next page</span>
        </div>
        <div class="absolute top-2 right-2 font-mono text-[10px] text-primary-container bg-black/70 px-2 py-1">
          <span id="pageCount">0</span> pages
        </div>
      </div>

      <!-- Camera controls -->
      <div class="flex gap-3">
        <button onclick="capture()" class="flex-[2] bg-primary text-on-primary font-headline font-bold py-3 text-sm uppercase tracking-widest keycap flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">photo_camera</span> Capture
        </button>
        <button id="btnNext" onclick="nextDoc()" disabled class="flex-1 bg-surface-container-high border-2 border-on-surface font-headline font-bold py-3 text-xs uppercase tracking-widest keycap-sm disabled:opacity-30">
          Next Doc
        </button>
      </div>
      <div class="flex gap-2">
        <button onclick="rotateImage()" class="bg-surface-container-high border border-outline-variant px-3 py-2 font-mono text-xs keycap-sm">↻ <span id="rotLabel">0°</span></button>
        <button onclick="toggleMotion()" class="bg-surface-container-high border border-outline-variant px-3 py-2 font-mono text-xs keycap-sm">Motion <span id="motionLabel">ON</span></button>
        <button id="btnFinish" onclick="finishScanning()" disabled class="ml-auto bg-tertiary text-on-tertiary font-headline font-bold px-4 py-2 text-xs uppercase tracking-widest keycap-sm disabled:opacity-30">
          Done (<span id="finishCount">0</span>)
        </button>
      </div>
    </div>

  </div>
</main>

<!-- PDF MODAL (quick scan results + RUN OCR) -->
<div id="pdfModal" class="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" style="display:none;">
  <div class="bg-surface-container-lowest border-2 border-on-surface p-6 max-w-sm w-[90%] hard-shadow">
    <h3 id="pdfModalTitle" class="font-headline text-sm font-bold uppercase tracking-tighter mb-2 break-all"></h3>
    <div class="bg-lcd-bg p-3 font-mono text-[10px] text-primary-container mb-4 leading-relaxed">
      <div id="pdfScanInfo"></div>
    </div>
    <button onclick="runOcr()" class="w-full bg-primary text-on-primary font-headline font-bold py-4 text-sm uppercase tracking-widest keycap flex flex-col items-center gap-1">
      <span>RUN OCR</span>
      <span id="ocrCost" class="text-[10px] font-normal opacity-70"></span>
    </button>
    <button onclick="closePdfModal()" class="w-full font-mono text-xs text-outline uppercase py-2 mt-2">Cancel</button>
  </div>
</div>

<!-- FINISH SCANNING MODAL -->
<div id="finishModal" class="fixed inset-0 z-[100] bg-black/60 flex items-center justify-center" style="display:none;">
  <div class="bg-surface-container-lowest border-2 border-on-surface p-6 max-w-sm w-[90%] hard-shadow">
    <h3 class="font-headline text-lg font-bold uppercase tracking-tighter mb-2">Session Complete</h3>
    <p id="finishSummary" class="font-mono text-xs text-outline mb-4"></p>
    <button onclick="classifySession()" class="w-full bg-primary text-on-primary font-headline font-bold py-3 text-sm uppercase tracking-widest keycap mb-3">
      Classify & File
    </button>
    <button onclick="closeFinishModal()" class="w-full font-mono text-xs text-outline uppercase py-2">Cancel</button>
  </div>
</div>

<!-- SETTINGS (overlay) -->
<div id="settingsOverlay" class="fixed inset-0 z-[90] bg-black/60 flex items-center justify-center" style="display:none;">
  <div class="bg-surface-container-lowest border-2 border-on-surface p-6 max-w-sm w-[90%] hard-shadow max-h-[80vh] overflow-y-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="font-headline text-lg font-bold uppercase tracking-tighter">Settings</h2>
      <button onclick="closeSettings()" class="text-outline hover:text-on-surface"><span class="material-symbols-outlined">close</span></button>
    </div>

    <!-- Save location -->
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Save Location</label>
      <div class="flex gap-2">
        <input id="outputPath" type="text" class="flex-1 bg-surface-container-high border border-outline-variant font-mono text-sm px-3 py-2 focus:ring-1 focus:ring-primary"/>
        <button onclick="saveOutputPath()" class="bg-primary text-on-primary font-headline font-bold px-3 py-2 text-xs uppercase keycap-sm">Set</button>
      </div>
      <div id="outputStatus" class="font-mono text-[10px] text-outline mt-1"></div>
    </div>

    <!-- Motion settings -->
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Motion Sensitivity</label>
      <input id="sensitivitySlider" type="range" min="1" max="10" value="5" class="w-full accent-primary"/>
      <div class="flex justify-between font-mono text-[9px] text-outline"><span>Thick pages</span><span>Thin pages</span></div>
    </div>
    <div class="mb-4">
      <label class="font-mono text-[10px] text-on-surface-variant uppercase block mb-1">Capture Delay</label>
      <input id="delaySlider" type="range" min="0.3" max="3" step="0.1" value="1.0" class="w-full accent-primary"/>
      <div class="flex justify-between font-mono text-[9px] text-outline"><span>Faster</span><span>More settling</span></div>
    </div>

    <!-- Image quality -->
    <div class="bg-lcd-bg p-3 font-mono text-[10px] text-primary-container mb-4">
      Resolution: 1500px · JPEG 85%<br/>
      Model: Gemini 3.1 Flash-Lite
    </div>
  </div>
</div>

<!-- API KEY BANNER (injected by JS if needed) -->

<script>
// ==================== STATE ====================
let stream = null, rotation = 0, totalPages = 0, currentDocPages = 0;
let motionEnabled = true, motionPrev = null, motionState = 'idle';
let motionStableStart = null, motionCooldownStart = null;
let pendingPdfFile = null, activeJobId = null, polling = false;
const M_THRESH = 8, S_THRESH = 3, S_DELAY = 1.0, COOLDOWN = 2.0;
const LIBRARY_KEY = 'scandoc9000_library';
const shownDocs = new Set();

// ==================== STATE MANAGEMENT ====================
function showState(name) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById('state' + name).classList.add('active');
}

function goHome() {
  showState('Home');
  document.getElementById('headerStatus').textContent = 'READY';
}

// ==================== CAMERA ====================
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) { console.error('Camera:', e); }
}

function openCamera() {
  showState('Camera');
  if (!stream) startCamera();
  if (motionEnabled) setTimeout(() => requestAnimationFrame(motionLoop), 1000);
}

function rotateImage() {
  rotation = (rotation + 90) % 360;
  document.getElementById('rotLabel').textContent = rotation + '\u00B0';
  const v = document.getElementById('video');
  v.style.transform = 'rotate(' + rotation + 'deg)';
  v.style.objectFit = (rotation === 90 || rotation === 270) ? 'contain' : 'cover';
}

// ==================== MOTION DETECTION ====================
function toggleMotion() {
  motionEnabled = !motionEnabled;
  document.getElementById('motionLabel').textContent = motionEnabled ? 'ON' : 'OFF';
  motionPrev = null; motionState = 'idle';
  if (motionEnabled) requestAnimationFrame(motionLoop);
}

function motionLoop() {
  if (!motionEnabled) return;
  const video = document.getElementById('video');
  if (!video.videoWidth) { requestAnimationFrame(motionLoop); return; }
  const c = document.getElementById('motionCanvas');
  const w=160, h=120; c.width=w; c.height=h;
  const ctx = c.getContext('2d',{willReadFrequently:true});
  ctx.drawImage(video,0,0,w,h);
  const d = ctx.getImageData(0,0,w,h).data;
  const gray = new Float32Array(w*h);
  for(let i=0;i<w*h;i++) gray[i]=d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114;
  const txt = document.getElementById('motionText');
  if(motionPrev){
    let diff=0;
    for(let i=0;i<gray.length;i++) diff+=Math.abs(gray[i]-motionPrev[i]);
    const delta=diff/gray.length;
    const now=performance.now()/1000;
    if(motionState==='idle'){ txt.textContent='Turn to next page'; if(delta>M_THRESH) motionState='turning'; }
    else if(motionState==='turning'){ txt.textContent='Page turning...'; if(delta<S_THRESH){motionState='stabilizing';motionStableStart=now;} }
    else if(motionState==='stabilizing'){ const el=now-motionStableStart; txt.textContent='Hold still... '+Math.max(0,S_DELAY-el).toFixed(1)+'s'; if(delta>S_THRESH) motionState='turning'; else if(el>=S_DELAY){capture();motionState='cooldown';motionCooldownStart=now;txt.textContent='Captured!';} }
    else if(motionState==='cooldown'){ const el=now-motionCooldownStart; txt.textContent='Got it! Turn page.'; if(el>=COOLDOWN) motionState='idle'; }
  }
  motionPrev=gray;
  requestAnimationFrame(motionLoop);
}

// ==================== CAPTURE ====================
async function capture() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width=video.videoWidth; canvas.height=video.videoHeight;
  canvas.getContext('2d').drawImage(video,0,0);
  const flash = document.getElementById('flash');
  flash.classList.add('fire'); setTimeout(()=>flash.classList.remove('fire'),150);
  const res = await fetch('/api/capture',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({image:canvas.toDataURL('image/jpeg',0.92), rotation:rotation})
  });
  const data = await res.json();
  if(data.ok!==false){
    totalPages++; currentDocPages=data.total_pages;
    document.getElementById('pageCount').textContent=totalPages;
    document.getElementById('docPages').textContent=currentDocPages;
    document.getElementById('btnNext').disabled=false;
    document.getElementById('btnFinish').disabled=false;
    document.getElementById('finishCount').textContent=totalPages;
  }
}

async function nextDoc() {
  await fetch('/api/next-doc',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  currentDocPages=0;
  document.getElementById('btnNext').disabled=true;
  document.getElementById('docPages').textContent='0';
}

async function finishScanning() {
  const res = await fetch('/api/finish-scanning',{method:'POST'});
  const data = await res.json();
  if(data.ok){
    document.getElementById('finishSummary').textContent = data.doc_count+' docs \u00B7 '+data.page_count+' pages \u00B7 ~$'+data.estimated_cost.toFixed(3);
    document.getElementById('finishModal').style.display='flex';
  }
}

async function classifySession() {
  document.getElementById('finishModal').style.display='none';
  showState('Processing');
  document.getElementById('jobFilename').textContent='Classifying documents...';
  document.getElementById('headerStatus').textContent='CLASSIFYING...';
  await fetch('/api/classify-session',{method:'POST'});
  startPolling();
}

function closeFinishModal(){ document.getElementById('finishModal').style.display='none'; }

// ==================== PDF UPLOAD ====================
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('dragover');});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e=>{e.preventDefault();uploadZone.classList.remove('dragover');if(e.dataTransfer.files[0])handlePdf(e.dataTransfer.files[0]);});
document.getElementById('pdfInput').addEventListener('change', e=>{if(e.target.files[0])handlePdf(e.target.files[0]);e.target.value='';});

async function handlePdf(file) {
  if(!file || !file.name.toLowerCase().endsWith('.pdf')) return;
  // Show uploading state
  const origHTML = uploadZone.innerHTML;
  uploadZone.innerHTML = '<span class="material-symbols-outlined text-5xl text-primary animate-pulse block mb-3">hourglass_top</span><div class="font-headline text-lg uppercase">Uploading...</div>';
  const formData = new FormData(); formData.append('file',file);
  const res = await fetch('/api/upload-pdf',{method:'POST',body:formData});
  const data = await res.json();
  uploadZone.innerHTML = origHTML;
  if(!data.ok) return;
  pendingPdfFile = data;
  // Show modal
  document.getElementById('pdfModalTitle').textContent = data.filename;
  const qs = data.quick_scan || {};
  const pages = qs.page_count || data.page_count;
  let info = pages + ' pages';
  if(qs.density) info += ' \u00B7 ' + qs.density;
  if(qs.avg_words_per_page) info += ' \u00B7 ~' + qs.avg_words_per_page + ' words/page';
  if(qs.est_total_words) info += '\n~' + qs.est_total_words.toLocaleString() + ' total words';
  if(qs.detected_header) info += '\nHeader: "' + qs.detected_header + '"';
  if(!qs.has_text_layer) info += '\nImage-only (scanned)';
  document.getElementById('pdfScanInfo').textContent = info;
  const isBook = pages > 20;
  const cost = isBook ? data.book_cost : data.classify_cost;
  const timeStr = qs.est_time_display || (isBook ? '~'+Math.round(pages*4/60)+'min' : '~'+(pages*3)+'s');
  document.getElementById('ocrCost').textContent = '~$'+cost.toFixed(3)+' / '+timeStr;
  document.getElementById('pdfModal').style.display='flex';
}

async function runOcr() {
  const pf = pendingPdfFile;
  closePdfModal();
  if(!pf) return;
  const pages = (pf.quick_scan||{}).page_count || pf.page_count;
  const isBook = pages > 20;
  // Switch to processing state
  showState('Processing');
  document.getElementById('jobFilename').textContent = pf.filename;
  document.getElementById('jobMeta').textContent = pages + ' pages';
  document.getElementById('jobProgressBar').style.width = '0%';
  document.getElementById('jobDetail').textContent = 'Starting...';
  document.getElementById('headerStatus').textContent = 'PROCESSING...';
  activeJobId = pf.job_id;
  if(isBook){
    await fetch('/api/start-book-ocr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:pf.job_id})});
    pollBookJob(pf.job_id);
  } else {
    await fetch('/api/start-classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({job_id:pf.job_id})});
    startPolling();
  }
}

function closePdfModal(){ document.getElementById('pdfModal').style.display='none'; pendingPdfFile=null; }

// ==================== BOOK OCR POLLING ====================
async function pollBookJob(jobId) {
  let lastChunk = '';
  async function poll() {
    try {
      const res = await fetch('/api/book-status/'+jobId);
      const job = await res.json();
      if(job.status==='processing'){
        const pct=job.progress||0;
        const chunk=job.current_chunk||'Analyzing...';
        document.getElementById('jobProgressBar').style.width=pct+'%';
        document.getElementById('jobDetail').textContent=chunk;
        document.getElementById('headerStatus').textContent='OCR '+pct+'%';
        setTimeout(poll,2000);
      } else if(job.status==='complete'){
        showComplete(jobId, document.getElementById('jobFilename').textContent, job.total_time);
      } else if(job.status==='error'){
        document.getElementById('jobDetail').textContent='Error: '+(job.error||'Unknown');
        document.getElementById('headerStatus').textContent='ERROR';
      } else {
        setTimeout(poll,1000);
      }
    } catch(e){ console.error(e); }
  }
  poll();
}

// ==================== CLASSIFY POLLING ====================
function startPolling(){ if(!polling){polling=true;pollStatus();} }
async function pollStatus() {
  try {
    const res = await fetch('/api/state');
    const state = await res.json();
    const active = (state.documents||[]).filter(d=>['queued','processing'].includes(d.status));
    const done = (state.documents||[]).filter(d=>['classified','filed'].includes(d.status));
    if(active.length>0){
      document.getElementById('jobDetail').textContent=active[0].status+'...';
      setTimeout(pollStatus,1000);
    } else {
      polling=false;
      if(done.length>0){
        const d = done[done.length-1];
        showComplete(null, (d.title||d.id)+' ['+d.category+']', d.processing_time, d);
        syncResultsToLocal(state.documents);
      } else {
        goHome();
      }
    }
  } catch(e){ polling=false; }
}

// ==================== SHOW COMPLETE ====================
function showComplete(jobId, title, time, classifyData) {
  showState('Complete');
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMeta').textContent = (time ? time.toFixed(1)+'s' : '') + (classifyData ? ' \u00B7 '+classifyData.category : '');
  document.getElementById('headerStatus').textContent = 'COMPLETE';
  // Build download links
  let links = '';
  if(jobId){
    links += '<a href="/api/book-download/'+jobId+'" class="flex-1 bg-primary text-on-primary font-headline font-bold py-3 text-xs uppercase tracking-widest text-center keycap-sm">.MD</a>';
    links += '<a href="/api/book-download-docx/'+jobId+'" class="flex-1 bg-surface-container-high border-2 border-on-surface font-headline font-bold py-3 text-xs uppercase tracking-widest text-center keycap-sm">.DOCX</a>';
  }
  document.getElementById('resultLinks').innerHTML = links;
  // Add to job history
  addToJobHistory(title, 'done', links);
}

// ==================== JOB HISTORY (localStorage) ====================
function getLocalLibrary(){ try{return JSON.parse(localStorage.getItem(LIBRARY_KEY)||'[]');}catch(e){return[];} }
function saveToLocalLibrary(doc){
  const lib=getLocalLibrary();
  const exists=lib.findIndex(d=>d.doc_id===doc.doc_id&&d.title===doc.title);
  if(exists>=0) lib[exists]=doc; else lib.push(doc);
  localStorage.setItem(LIBRARY_KEY,JSON.stringify(lib));
}
function syncResultsToLocal(documents){
  (documents||[]).filter(d=>['classified','filed'].includes(d.status)).forEach(d=>{
    saveToLocalLibrary({doc_id:d.id,category:d.category||'misc',title:d.title||d.id,
      slug:d.id,date:new Date().toISOString().slice(0,10),summary:d.summary||'',
      page_count:d.pages||0,processing_time:d.processing_time||0,cost:d.cost||0,
      scanned_at:new Date().toISOString()});
  });
}
function addToJobHistory(title,status,links){
  const list=document.getElementById('jobList');
  if(list.querySelector('.italic')) list.innerHTML='';
  const item=document.createElement('div');
  item.className='bg-surface-container-lowest p-2.5 border border-outline-variant';
  item.innerHTML='<div class="flex justify-between items-center"><span class="font-mono text-[11px] font-bold uppercase truncate">'+title+'</span><span class="font-mono text-[9px] text-primary-container uppercase">'+status+'</span></div>'+(links?'<div class="flex gap-2 mt-1">'+links+'</div>':'');
  list.prepend(item);
}
function loadJobHistory(){
  const local=getLocalLibrary();
  if(!local.length) return;
  const list=document.getElementById('jobList');
  list.innerHTML='';
  local.slice().reverse().slice(0,10).forEach(s=>{
    addToJobHistory((s.title||'Untitled')+' ['+(s.category||'')+']','done','');
  });
}

// ==================== SETTINGS ====================
function showSettings(){ document.getElementById('settingsOverlay').style.display='flex'; loadOutputPath(); }
function closeSettings(){ document.getElementById('settingsOverlay').style.display='none'; }
async function loadOutputPath(){
  try{ const d=await(await fetch('/api/health')).json(); if(d.output_dir) document.getElementById('outputPath').value=d.output_dir; }catch(e){}
}
async function saveOutputPath(){
  const path=document.getElementById('outputPath').value.trim();
  if(!path) return;
  const d=await(await fetch('/api/set-output',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})})).json();
  document.getElementById('outputStatus').textContent=d.ok?'Saved: '+d.path:'Error: '+(d.error||'');
  document.getElementById('outputStatus').style.color=d.ok?'#2aa198':'#ba1a1a';
}
document.getElementById('sensitivitySlider').addEventListener('input',function(){
  const v=this.value;
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'motion_threshold',value:11-v})});
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'stability_threshold',value:2.2-(v*0.2)})});
});
document.getElementById('delaySlider').addEventListener('input',function(){
  fetch('/api/update-setting',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'stability_delay',value:parseFloat(this.value)})});
});

function togglePreview(){
  const area=document.getElementById('previewArea');
  area.classList.toggle('hidden');
  if(!area.classList.contains('hidden') && !area.textContent && activeJobId){
    fetch('/api/book-download/'+activeJobId).then(r=>r.text()).then(t=>{area.textContent=t.slice(0,5000)+'...';}); }
}

// ==================== API KEY CHECK ====================
async function checkHealth(){
  try{ const d=await(await fetch('/api/health')).json();
    if(!d.has_api_key){
      const b=document.createElement('div');
      b.className='fixed top-12 left-0 right-0 z-40 bg-error text-on-error px-4 py-3 font-mono text-xs text-center';
      b.innerHTML='GEMINI_API_KEY not set. <code class="bg-black/20 px-1">export GEMINI_API_KEY=your_key</code> <a href="https://aistudio.google.com/apikey" target="_blank" class="underline">Get key</a>';
      document.body.appendChild(b);
    }
  }catch(e){}
}

// ==================== INIT ====================
checkHealth();
loadJobHistory();
</script>
